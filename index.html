<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Escolar - Iniciar Sesión</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="login-container">
        <div class="logo-space" style="text-align: center; margin-bottom: 15px;">
            <img src="logo.jpg" alt="Logotipo Colegio" style="max-width: 130px; width: 100%; height: auto; display: inline-block;">
        </div>
        
        <h2 style="text-align: center; margin: 10px 0; font-size: 1.6rem; color: #1e293b;">Sistema de Expedientes</h2>
        <p class="subtitulo" style="text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 20px;">Ingresa tus credenciales para acceder</p>

        <form id="login-form">
            <div class="input-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" required placeholder="Ej. admin o tu usuario">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-ingresar">Iniciar Sesión</button>
        </form>
        
        <div id="mensaje-error" class="error-alerta" style="display: none; margin-top: 15px; color: #d73a49; text-align: center; font-weight: bold;"></div>
    </div>

    <script src="login.js"></script>
</body>
</html>
